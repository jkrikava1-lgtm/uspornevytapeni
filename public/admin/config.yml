backend:
  name: github
  repo: jkrikava1-lgtm/uspornevytapeni
  branch: main
  base_url: https://uspornevytapeni.vercel.app
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

locale: cs

collections:
  - name: settings
    label: Nastavení webu
    files:
      - name: site
        label: Kontaktní údaje a firma
        file: src/data/site.json
        format: json
        fields:
          - { label: Název firmy, name: name, widget: string }
          - { label: "Telefon (zobrazený, např. +420 777 724 573)", name: phone, widget: string }
          - { label: "Telefon (odkaz, např. tel:+420777724573)", name: phone_href, widget: string }
          - { label: E-mail, name: email, widget: string }
          - { label: "Adresa — ulice a číslo", name: address_line1, widget: string }
          - { label: "Adresa — PSČ a město", name: address_line2, widget: string }
          - { label: Rok založení, name: founded, widget: string }
          - { label: Tagline (krátký popis firmy), name: tagline, widget: string }

  - name: homepage
    label: Obsah úvodní stránky
    files:
      - name: hp
        label: Úvodní stránka
        file: src/data/homepage.json
        format: json
        fields:
          - { label: "Hero — malý text nad nadpisem", name: hero_badge, widget: string }
          - { label: "Hero — nadpis řádek 1", name: hero_h1_line1, widget: string }
          - { label: "Hero — zvýrazněná část nadpisu", name: hero_h1_highlight, widget: string }
          - { label: "Hero — nadpis řádek 3", name: hero_h1_line3, widget: string }
          - { label: "Hero — popis pod nadpisem", name: hero_text, widget: text }
          - { label: "Hero — tlačítko poptávka", name: hero_cta_primary, widget: string }
          - { label: "Hero — tlačítko reference", name: hero_cta_secondary, widget: string }
          - { label: "Statistika 1 — číslo", name: stat1_number, widget: string }
          - { label: "Statistika 1 — popis", name: stat1_label, widget: string }
          - { label: "Statistika 2 — číslo", name: stat2_number, widget: string }
          - { label: "Statistika 2 — popis", name: stat2_label, widget: string }
          - { label: "Statistika 3 — číslo", name: stat3_number, widget: string }
          - { label: "Statistika 3 — popis", name: stat3_label, widget: string }
          - { label: "Proč TČ — nadpis", name: savings_headline, widget: string }
          - { label: "Proč TČ — text", name: savings_text, widget: text }
          - { label: "Proč my — nadpis", name: why_us_headline, widget: string }
          - { label: "Citát — text", name: testimonial_text, widget: text }
          - { label: "Citát — jméno", name: testimonial_name, widget: string }
          - { label: "Citát — lokalita a typ", name: testimonial_location, widget: string }
          - { label: "Dotace — nadpis", name: dotace_headline, widget: string }
          - { label: "Dotace — text", name: dotace_text, widget: string }
          - { label: "CTA — nadpis", name: cta_headline, widget: string }
          - { label: "CTA — text", name: cta_text, widget: text }
